version: '3.8'

services:
  aytix-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aytix-frontend-new
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api/v1
      - API_PROXY_URL=${API_PROXY_URL:-http://host.docker.internal:10018}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

